name: Release Binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build ${{ matrix.build }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - build: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: portcull
            asset_name: portcull-linux-x86_64
            use_cross: false

          - build: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary_name: portcull
            asset_name: portcull-linux-arm64
            use_cross: true

          - build: macos-arm64
            os: macos-15
            target: aarch64-apple-darwin
            binary_name: portcull
            asset_name: portcull-macos-arm64
            use_cross: false

          - build: windows-x86_64
            os: windows-2022
            target: x86_64-pc-windows-msvc
            binary_name: portcull.exe
            asset_name: portcull-windows-x86_64.exe
            use_cross: false

          - build: windows-arm64
            os: windows-2022
            target: aarch64-pc-windows-msvc
            binary_name: portcull.exe
            asset_name: portcull-windows-arm64.exe
            use_cross: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Build binary natively
        if: matrix.use_cross == false
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build binary with Cross
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename binary on Unix
        if: runner.os != 'Windows'
        run: mv "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "${{ matrix.asset_name }}"

      - name: Rename binary on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: Move-Item "target\${{ matrix.target }}\release\${{ matrix.binary_name }}" "${{ matrix.asset_name }}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
